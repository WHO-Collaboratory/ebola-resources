name: Validate resources

on:
  pull_request:
    paths:
      - "data/resources.yml"
      - "main.py"
      - "docs/**"
      - "test_validate_resources.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install pyyaml pytest

      - name: Validate resources and rendering
        run: pytest test_validate_resources.py -v
