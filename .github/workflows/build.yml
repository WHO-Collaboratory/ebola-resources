name: Build and validate site

on:
  workflow_call:
    inputs:
      base_url:
        type: string
        default: /ebola-resources

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jupyter-book pyyaml

      - name: Validate myst.yml
        run: python .github/scripts/validate-myst.py

      - name: Set base URL in myst.yml
        if: inputs.base_url != '/ebola-resources'
        run: |
          python -c "
          import yaml
          with open('myst.yml') as f:
              config = yaml.safe_load(f)
          config['site']['options']['base_url'] = '${{ inputs.base_url }}'
          with open('myst.yml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)
          "

      - name: Build site
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          jupyter-book build --html
          touch _build/html/.nojekyll

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _build/html
          include-hidden-files: true
